name: AIS Collector

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger le repo
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Installer les librairies
        run: pip install -r requirements.txt

      - name: Lancer le script
        run: python collect_ais.py

      - name: Sauvegarder les données
        env:
          AIS_PUSH_TOKEN: ${{ secrets.AIS_TOKEN}}  # <-- ton secret ici
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/*.csv
          git commit -m "Update AIS dataset" || echo "No changes"
          git push https://ZouarhiYassmin:${AIS_PUSH_TOKEN}@github.com/ZouarhiYassmin/ais-dataset-vesselfinder.git
